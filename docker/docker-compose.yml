services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://sadaka:sadaka@db:5432/sadaka
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sadaka
      POSTGRES_USER: sadaka
      POSTGRES_PASSWORD: sadaka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://sadaka:sadaka@db:5432/sadaka
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config beat -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://sadaka:sadaka@db:5432/sadaka
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

  telegram_auth_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m bot.auth_bot
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://sadaka:sadaka@db:5432/sadaka
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

  telegram_support_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m bot.support_bot
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: postgres://sadaka:sadaka@db:5432/sadaka
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app

volumes:
  postgres_data:

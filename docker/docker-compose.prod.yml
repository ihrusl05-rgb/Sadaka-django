services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadaka:change-me@db:5432/sadaka}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sadaka}
      POSTGRES_USER: ${POSTGRES_USER:-sadaka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --appendonly yes
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadaka:change-me@db:5432/sadaka}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config beat -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadaka:change-me@db:5432/sadaka}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  telegram_auth_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m bot.auth_bot
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadaka:change-me@db:5432/sadaka}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  telegram_support_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m bot.support_bot
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadaka:change-me@db:5432/sadaka}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
